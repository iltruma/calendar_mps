<!DOCTYPE html>
<html lang="it" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Piano Assenze</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="container-fluid">
        <nav>
            <ul>
                <li><strong>Piano Assenze</strong></li>
            </ul>
            <ul>
                <li>
                    <div class="year-selector">
                        <button class="outline" id="prev-year">&larr;</button>
                        <span id="current-year">2026</span>
                        <button class="outline" id="next-year">&rarr;</button>
                    </div>
                </li>
                <li>
                    <select id="profile-select">
                        <option value="">-- Seleziona profilo --</option>
                    </select>
                </li>
                <li><button class="outline" id="new-profile-btn">Nuovo</button></li>
                <li><button class="outline secondary" id="delete-profile-btn">Elimina</button></li>
                <li><button class="outline" id="export-btn">Esporta</button></li>
                <li>
                    <button class="outline" id="import-btn">Importa</button>
                    <input type="file" id="import-file" accept=".json" class="hidden">
                </li>
            </ul>
        </nav>

        <div id="no-profile-msg">
            <p>Seleziona o crea un profilo per iniziare.</p>
        </div>

        <div id="app-content" class="hidden">
            <div class="grid counters">
                <article class="counter" id="counter-F">
                    <span class="counter-label">Ferie</span>
                    <span class="counter-value"><span class="used">0</span> / <span class="total">20</span> giorni</span>
                    <button class="outline edit-budget-btn" data-type="F" title="Modifica budget">&#9881;</button>
                </article>
                <article class="counter" id="counter-R">
                    <span class="counter-label">ROL</span>
                    <span class="counter-value"><span class="used">0</span> / <span class="total">56</span> ore</span>
                    <button class="outline edit-budget-btn" data-type="R" title="Modifica budget">&#9881;</button>
                </article>
                <article class="counter" id="counter-FS">
                    <span class="counter-label">Fest. Soppr.</span>
                    <span class="counter-value"><span class="used">0</span> / <span class="total">4</span> giorni</span>
                    <button class="outline edit-budget-btn" data-type="FS" title="Modifica budget">&#9881;</button>
                </article>
            </div>

            <div class="calendar-container">
                <table id="calendar-table" class="striped">
                    <thead>
                        <tr></tr>
                    </thead>
                    <tbody id="calendar-body">
                    </tbody>
                </table>
            </div>

            <div class="legend">
                <span class="legend-item"><span class="legend-color legend-F"></span> F = Ferie</span>
                <span class="legend-item"><span class="legend-color legend-R"></span> R = ROL</span>
                <span class="legend-item"><span class="legend-color legend-FS"></span> FS = Fest. Soppr.</span>
                <span class="legend-item"><span class="legend-color legend-weekend"></span> Weekend</span>
                <span class="legend-item"><span class="legend-color legend-holiday"></span> Festivita</span>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/dayjs@1/dayjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1/plugin/isoWeek.js"></script>
    <script>dayjs.extend(dayjs_plugin_isoWeek);</script>
    <script src="app.js"></script>
</body>
</html>
