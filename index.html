<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Piano Assenze</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="header-title">
            <img src="assets/logo_mps.jpg" alt="Logo MPS" class="logo">
            <h1>Piano Assenze</h1>
        </div>
        <div class="header-controls">
            <div class="year-selector">
                <button id="prev-year">&larr;</button>
                <span id="current-year">2026</span>
                <button id="next-year">&rarr;</button>
            </div>
            <div class="profile-selector">
                <select id="profile-select">
                    <option value="">-- Seleziona profilo --</option>
                </select>
                <button id="new-profile-btn">Nuovo</button>
                <button id="delete-profile-btn">Elimina</button>
            </div>
            <div class="data-actions">
                <button id="export-btn" title="Esporta dati in JSON">Esporta</button>
                <button id="import-btn" title="Importa dati da JSON">Importa</button>
                <input type="file" id="import-file" accept=".json" class="hidden">
            </div>
        </div>
    </header>

    <div id="no-profile-msg" class="no-profile-msg">
        <p>Seleziona o crea un profilo per iniziare.</p>
    </div>

    <div id="app-content" class="hidden">
        <section class="counters">
            <div class="counter" id="counter-F">
                <span class="counter-label">Ferie</span>
                <span class="counter-value"><span class="used">0</span> / <span class="total">18</span> giorni</span>
                <button class="edit-budget-btn" data-type="F" title="Modifica budget">&#9881;</button>
            </div>
            <div class="counter" id="counter-E">
                <span class="counter-label">Ex Festivita</span>
                <span class="counter-value"><span class="used">0:00</span> / <span class="total">30:00</span> ore</span>
                <button class="edit-budget-btn" data-type="E" title="Modifica budget">&#9881;</button>
            </div>
        </section>

        <section class="calendar-container">
            <table id="calendar-table">
                <thead>
                    <tr></tr>
                </thead>
                <tbody id="calendar-body">
                </tbody>
            </table>
        </section>

        <section class="legend">
            <span class="legend-item"><span class="legend-color legend-F"></span> F = Ferie</span>
            <span class="legend-item"><span class="legend-color legend-E"></span> E = Ex Festivita</span>
            <span class="legend-item"><span class="legend-color legend-weekend"></span> Weekend</span>
            <span class="legend-item"><span class="legend-color legend-prefestivo"></span> Prefestivo</span>
            <span class="legend-item"><span class="legend-color legend-holiday"></span> Festivita</span>
        </section>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/dayjs@1/dayjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1/plugin/isoWeek.js"></script>
    <script>dayjs.extend(dayjs_plugin_isoWeek);</script>
    <script src="app.js"></script>
</body>
</html>
